<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — UCSB Applied Economics Club</title>
  <style>
    :root {
      --bg: #090F1A; --gold: #C4A448; --muted: rgba(255,255,255,0.55);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
    body::before {
      content: ''; position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 900px; height: 600px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(43,74,111,0.18) 0%, rgba(196,164,72,0.05) 45%, transparent 70%);
      pointer-events: none;
    }
    .code { font-size: clamp(5rem, 14vw, 9rem); font-weight: 900; letter-spacing: -0.05em; color: var(--gold); line-height: 1; opacity: 0.22; }
    .msg { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; margin-top: -16px; margin-bottom: 14px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); font-size: 1rem; line-height: 1.7; max-width: 400px; margin-bottom: 36px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 13px 30px; border-radius: 999px;
      background: var(--gold); color: #090F1A;
      font-weight: 700; font-size: 0.95rem; text-decoration: none;
      box-shadow: 0 8px 28px rgba(196,164,72,0.28);
      transition: transform 0.2s, filter 0.2s;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.07); }
    .links { margin-top: 24px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .links a { color: rgba(255,255,255,0.45); font-size: 0.9rem; text-decoration: none; transition: color 0.2s; }
    .links a:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1 class="msg">Page not found</h1>
  <p class="sub">The page you're looking for doesn't exist or may have moved.</p>
  <a href="index.html" class="btn">Back to Home</a>
  <nav class="links">
    <a href="vote.html">Vote</a>
    <a href="topics.html">Topics</a>
    <a href="board.html">Board</a>
    <a href="signin.html">Sign In</a>
    <a href="members.html">Members</a>
  </nav>
</body>
</html>
