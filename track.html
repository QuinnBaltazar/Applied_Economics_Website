<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track | UCSB Applied Economics Club</title>
  <style>
    :root {
      --bg:      #090F1A;
      --surface: #0E1829;
      --navy:    #162438;
      --gold:    #C4A448;
      --gold-lt: #D4B55E;
      --steel:   #2B4A6F;
      --text:    #FFFFFF;
      --muted:   rgba(255,255,255,0.62);
      --border:  rgba(255,255,255,0.07);
      --shadow:  0 24px 60px rgba(0,0,0,0.26);
      --green:   #4CB87A;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: var(--bg); color: var(--text); line-height: 1.6; scroll-behavior: smooth; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 1100px; height: 700px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(43,74,111,0.16) 0%, rgba(196,164,72,0.05) 45%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .page { max-width: 1080px; margin: 0 auto; padding: 64px 0 0; position: relative; z-index: 1; overflow-x: hidden; }

    /* ── NAV ── */
    .topbar { position: fixed; top: 0; left: 0; right: 0; width: 100%; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(20px, 4vw, 56px); height: 64px; background: rgba(9,15,26,0.78); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border-bottom: 1px solid rgba(255,255,255,0.05); transition: background .35s, box-shadow .35s, border-color .35s; animation: navDown .55s cubic-bezier(.4,0,.2,1) both; }
    @keyframes navDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .topbar.scrolled { background: rgba(9,15,26,.97); box-shadow: 0 2px 40px rgba(0,0,0,.45); border-color: rgba(196,164,72,.14); }
    .brand { font-size: .78rem; font-weight: 800; color: #fff; letter-spacing: .22em; text-transform: uppercase; text-decoration: none; white-space: nowrap; flex-shrink: 0; transition: color .2s; }
    .brand:hover { color: var(--gold); }
    .main-nav { display: flex; align-items: center; gap: 2px; }
    .main-nav a { position: relative; display: inline-flex; align-items: center; padding: 8px 13px; color: rgba(255,255,255,.65); text-decoration: none; font-size: .875rem; font-weight: 500; letter-spacing: .03em; border-radius: 8px; transition: color .2s, background .2s; }
    .main-nav a::after { content: ''; position: absolute; bottom: 5px; left: 13px; right: 13px; height: 2px; background: var(--gold); border-radius: 2px; transform: scaleX(0); transition: transform .25s cubic-bezier(.4,0,.2,1); transform-origin: center; }
    .main-nav a:hover { color: #fff; background: rgba(255,255,255,.05); }
    .main-nav a:hover::after, .main-nav a.active::after { transform: scaleX(1); }
    .main-nav a.active { color: #fff; font-weight: 700; background: rgba(196,164,72,.08); }

    /* ── BACK LINK ── */
    .back-link { display: inline-flex; align-items: center; gap: 7px; margin: 32px 24px 0; color: rgba(255,255,255,0.45); font-size: .83rem; font-weight: 600; text-decoration: none; letter-spacing: .03em; transition: color .2s; }
    .back-link:hover { color: var(--gold); }
    .back-link::before { content: '←'; font-size: .9rem; }

    /* ── TRACK HERO ── */
    .track-hero { margin: 20px 24px 0; padding: 40px 42px 36px; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-left: 3px solid var(--gold); border-radius: 0 24px 24px 0; box-shadow: 0 20px 60px rgba(0,0,0,0.22); }
    .hero-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 32px; flex-wrap: wrap; }
    .hero-left { flex: 1; min-width: 260px; }
    .track-badge { display: inline-flex; padding: 5px 14px; border-radius: 999px; background: rgba(196,164,72,0.12); color: var(--gold); font-size: .7rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; margin-bottom: 14px; }
    .track-title { font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 800; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 8px; }
    .track-tagline-lg { color: rgba(255,255,255,0.6); font-size: 1.05rem; line-height: 1.55; margin-bottom: 20px; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag { padding: 5px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); color: rgba(255,255,255,0.55); font-size: .78rem; font-weight: 500; letter-spacing: .02em; }

    /* ── PROGRESS CARD ── */
    .hero-progress { flex-shrink: 0; width: 220px; padding: 22px 24px; background: rgba(196,164,72,0.05); border: 1px solid rgba(196,164,72,0.14); border-radius: 18px; display: flex; flex-direction: column; gap: 12px; }
    .hp-nums { display: flex; align-items: baseline; gap: 4px; }
    .hp-done { font-size: 2.4rem; font-weight: 800; color: var(--gold); line-height: 1; }
    .hp-total { font-size: 1rem; color: rgba(255,255,255,0.45); font-weight: 500; }
    .hp-bar-wrap { height: 6px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
    .hp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-lt)); border-radius: 6px; transition: width .7s cubic-bezier(.4,0,.2,1); width: 0%; }
    .hp-credits { font-size: .82rem; color: rgba(255,255,255,0.45); }
    .hp-credits strong { color: var(--gold); }
    .hp-status { font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
    .hp-status.not-started { color: rgba(255,255,255,0.25); }
    .hp-status.in-progress { color: var(--gold); }
    .hp-status.complete { color: var(--green); }

    /* ── SECTION LABEL ── */
    .section-label { display: block; font-size: .7rem; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); margin: 0 24px 18px; }

    /* ── DIVIDER ── */
    .gold-divider { height: 1px; background: linear-gradient(to right, transparent, rgba(196,164,72,0.2), transparent); margin: 36px 24px; }

    /* ── MODULES LIST ── */
    .modules-list { margin: 0 24px; display: flex; flex-direction: column; gap: 16px; }

    .module-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 28px 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      transition: border-color .25s, box-shadow .25s;
      opacity: 0; transform: translateY(16px);
      animation: moduleIn .4s cubic-bezier(.4,0,.2,1) forwards;
    }
    .module-card:hover { border-color: rgba(196,164,72,0.2); box-shadow: 0 16px 44px rgba(0,0,0,0.2); }
    .module-card.done { border-color: rgba(76,184,122,0.2); background: linear-gradient(135deg, var(--surface) 0%, rgba(76,184,122,0.03) 100%); }

    @keyframes moduleIn { to { opacity: 1; transform: none; } }

    .module-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .module-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .module-num { width: 34px; height: 34px; border-radius: 10px; background: rgba(196,164,72,0.12); border: 1px solid rgba(196,164,72,0.2); display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 800; color: var(--gold); flex-shrink: 0; transition: background .3s, border-color .3s; }
    .module-card.done .module-num { background: rgba(76,184,122,0.15); border-color: rgba(76,184,122,0.3); color: var(--green); }
    .module-time { font-size: .78rem; color: rgba(255,255,255,0.35); font-weight: 500; }

    .module-action { flex-shrink: 0; }
    .complete-btn { padding: 9px 18px; border-radius: 999px; background: rgba(196,164,72,0.1); border: 1px solid rgba(196,164,72,0.25); color: var(--gold); font-size: .82rem; font-weight: 700; cursor: pointer; transition: background .2s, border-color .2s, transform .15s; letter-spacing: .02em; }
    .complete-btn:hover { background: rgba(196,164,72,0.18); border-color: rgba(196,164,72,0.4); transform: translateY(-1px); }
    .complete-btn:active { transform: translateY(0); }
    .complete-btn.done-badge { background: rgba(76,184,122,0.12); border-color: rgba(76,184,122,0.25); color: var(--green); cursor: default; }
    .complete-btn.done-badge:hover { transform: none; }
    .signin-prompt { font-size: .82rem; color: rgba(255,255,255,0.35); font-weight: 500; }
    .signin-prompt a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .signin-prompt a:hover { text-decoration: underline; }

    .module-title { font-size: 1.12rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .module-divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 14px; }
    .module-desc { color: rgba(255,255,255,0.68); font-size: .925rem; line-height: 1.78; margin-bottom: 18px; }

    .module-footer { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .module-tools { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .tools-label { font-size: .74rem; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-right: 2px; }
    .tool-tag { padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: .76rem; font-weight: 500; }
    .module-deliverable { font-size: .82rem; color: rgba(255,255,255,0.38); font-style: italic; text-align: right; max-width: 260px; }
    .module-deliverable strong { color: rgba(255,255,255,0.55); font-style: normal; font-weight: 600; }

    /* ── TRACK COMPLETE BANNER ── */
    .track-complete {
      margin: 32px 24px 0;
      padding: 36px 40px;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(76,184,122,0.06) 100%);
      border: 1px solid rgba(76,184,122,0.25);
      border-radius: 24px;
      text-align: center;
      display: none;
    }
    .track-complete.visible { display: block; }
    .tc-icon { font-size: 2.4rem; margin-bottom: 14px; display: block; }
    .tc-title { font-size: 1.6rem; font-weight: 800; color: var(--green); letter-spacing: -.02em; margin-bottom: 8px; }
    .tc-copy { color: rgba(255,255,255,0.62); font-size: .95rem; line-height: 1.7; max-width: 480px; margin: 0 auto 24px; }
    .btn-secondary { display: inline-flex; align-items: center; justify-content: center; padding: 13px 26px; border-radius: 999px; background: rgba(76,184,122,0.12); border: 1px solid rgba(76,184,122,0.28); color: var(--green); font-weight: 700; font-size: .9rem; text-decoration: none; transition: background .2s, transform .2s; }
    .btn-secondary:hover { background: rgba(76,184,122,0.2); transform: translateY(-2px); }

    /* ── RELATED TRACKS ── */
    .related-section { margin: 52px 24px 0; }
    .related-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .related-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 22px 22px 20px; text-decoration: none; color: inherit; display: block; transition: transform .2s, border-color .2s; }
    .related-card:hover { transform: translateY(-3px); border-color: rgba(196,164,72,0.22); }
    .related-card .track-badge { font-size: .65rem; padding: 4px 11px; margin-bottom: 10px; display: inline-flex; }
    .related-name { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .related-tagline { font-size: .82rem; color: rgba(255,255,255,0.45); line-height: 1.5; }

    /* ── VERIFICATION NOTE ── */
    .verify-note { margin: 24px 24px 0; padding: 14px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; font-size: .82rem; color: rgba(255,255,255,0.38); line-height: 1.6; }
    .verify-note strong { color: rgba(255,255,255,0.55); font-weight: 600; }

    /* ── FOOTER ── */
    .footer { margin: 44px 24px 44px; text-align: center; color: rgba(255,255,255,0.25); font-size: .88rem; border-top: 1px solid var(--border); padding-top: 28px; }
    .footer strong { color: var(--gold); font-weight: 600; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      padding: 14px 20px; border-radius: 14px;
      background: rgba(14,24,41,0.96); border: 1px solid rgba(196,164,72,0.22);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.36);
      font-size: .9rem; font-weight: 600; color: #fff;
      display: flex; align-items: center; gap: 10px;
      opacity: 0; transform: translateY(12px);
      transition: opacity .3s cubic-bezier(.4,0,.2,1), transform .3s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast-icon { font-size: 1.1rem; flex-shrink: 0; }

    /* ── SUBMIT FORM ── */
    .module-submit-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
    .module-submit-wrap { display: flex; flex-direction: column; gap: 9px; }
    .submit-link-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; padding: 10px 14px; font: inherit; font-size: .84rem; outline: none; transition: border-color .2s; width: 100%; }
    .submit-link-input:focus { border-color: rgba(196,164,72,0.45); }
    .submit-link-input::placeholder { color: rgba(255,255,255,0.25); }
    .submit-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .submit-btn { flex-shrink: 0; padding: 9px 20px; border-radius: 999px; background: rgba(196,164,72,0.1); border: 1px solid rgba(196,164,72,0.28); color: var(--gold); font-size: .82rem; font-weight: 700; cursor: pointer; transition: background .2s, border-color .2s, transform .15s; }
    .submit-btn:hover { background: rgba(196,164,72,0.18); border-color: rgba(196,164,72,0.45); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    .submit-hint { font-size: .76rem; color: rgba(255,255,255,0.25); }
    .pending-badge { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 999px; background: rgba(255,200,50,0.07); border: 1px solid rgba(255,200,50,0.2); color: rgba(255,200,80,0.88); font-size: .82rem; font-weight: 700; }
    .rejected-wrap { display: flex; flex-direction: column; gap: 10px; }
    .rejected-badge { display: inline-flex; align-items: center; padding: 5px 13px; border-radius: 999px; background: rgba(255,100,80,0.08); border: 1px solid rgba(255,100,80,0.2); color: rgba(255,130,110,0.9); font-size: .78rem; font-weight: 700; }
    .rejected-note { font-size: .82rem; color: rgba(255,140,120,0.8); line-height: 1.55; }

    /* ── CONCEPTS ── */
    .concepts-section { margin-bottom: 16px; }
    .concepts-strip { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 0; }
    .concept-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 13px; border-radius: 8px; background: rgba(43,74,111,0.22); border: 1px solid rgba(43,74,111,0.38); color: rgba(255,255,255,0.65); font-size: .76rem; font-weight: 600; cursor: pointer; transition: background .2s, border-color .2s, color .2s; user-select: none; font-family: inherit; }
    .concept-pill:hover, .concept-pill.active { background: rgba(43,74,111,0.4); border-color: rgba(43,74,111,0.65); color: #fff; }
    .concept-pill::before { content: '◆'; font-size: .5rem; color: rgba(196,164,72,0.65); margin-right: 1px; }
    .concept-defs { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .concept-def-row { display: none; padding: 10px 14px; background: rgba(43,74,111,0.12); border: 1px solid rgba(43,74,111,0.22); border-radius: 10px; font-size: .83rem; color: rgba(255,255,255,0.62); line-height: 1.65; }
    .concept-def-row .cdef-term { font-weight: 700; color: rgba(255,255,255,0.85); margin-right: 6px; }
    .concept-def-row.open { display: block; }

    /* ── RESOURCE BAR ── */
    .resource-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center; }
    .resource-label { font-size: .7rem; color: rgba(255,255,255,0.28); font-weight: 700; letter-spacing: .1em; text-transform: uppercase; flex-shrink: 0; }
    .vid-link { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 8px; background: rgba(220,50,50,0.07); border: 1px solid rgba(220,50,50,0.2); color: rgba(255,110,110,0.82); font-size: .76rem; font-weight: 600; text-decoration: none; transition: background .2s, border-color .2s; }
    .vid-link:hover { background: rgba(220,50,50,0.14); border-color: rgba(220,50,50,0.35); color: #ff8080; }
    .vid-link::before { content: '▶'; font-size: .6rem; }

    /* ── DIFFICULTY SECTION LABELS ── */
    .difficulty-section { margin: 28px 0 12px; display: flex; align-items: center; gap: 12px; }
    .difficulty-section-line { flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
    .difficulty-section-label { font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; padding: 4px 12px; border-radius: 999px; white-space: nowrap; }
    .diff-foundation .difficulty-section-label { color: rgba(100,180,255,0.75); background: rgba(43,74,111,0.22); border: 1px solid rgba(43,74,111,0.38); }
    .diff-intermediate .difficulty-section-label { color: var(--gold-lt); background: rgba(196,164,72,0.1); border: 1px solid rgba(196,164,72,0.22); }
    .diff-capstone .difficulty-section-label { color: #a78bfa; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.28); }

    /* ── DIFFICULTY BADGE (inline on card) ── */
    .diff-badge { font-size: .65rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; }
    .diff-badge-foundation { color: rgba(100,180,255,0.7); background: rgba(43,74,111,0.2); border: 1px solid rgba(43,74,111,0.32); }
    .diff-badge-intermediate { color: rgba(212,181,94,0.85); background: rgba(196,164,72,0.08); border: 1px solid rgba(196,164,72,0.18); }
    .diff-badge-capstone { color: rgba(167,139,250,0.9); background: rgba(139,92,246,0.09); border: 1px solid rgba(139,92,246,0.24); }

    /* ── CAPSTONE CARD ACCENT ── */
    .module-card.capstone { border-color: rgba(139,92,246,0.22); background: linear-gradient(135deg, var(--surface) 0%, rgba(139,92,246,0.04) 100%); }
    .module-card.capstone:hover { border-color: rgba(139,92,246,0.38); }

    /* ── RESUME LINE BANNER (capstone) ── */
    .resume-line { margin-bottom: 18px; padding: 12px 16px; background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.22); border-radius: 12px; display: flex; align-items: flex-start; gap: 10px; }
    .resume-line-icon { font-size: .85rem; flex-shrink: 0; margin-top: 1px; }
    .resume-line-text { font-size: .82rem; color: rgba(255,255,255,0.62); line-height: 1.6; }
    .resume-line-text strong { color: rgba(167,139,250,0.9); font-weight: 700; display: block; margin-bottom: 3px; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; }

    /* ── QUIZ ── */
    .quiz-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.06); }
    .quiz-label { font-size: .68rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: rgba(100,180,255,0.7); margin-bottom: 14px; display: block; }
    .quiz-questions { display: flex; flex-direction: column; gap: 16px; }
    .quiz-q { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 16px; }
    .quiz-q-text { font-size: .875rem; font-weight: 600; color: rgba(255,255,255,0.82); margin-bottom: 10px; line-height: 1.55; }
    .quiz-opts { display: flex; flex-direction: column; gap: 6px; }
    .quiz-opt { display: flex; align-items: flex-start; gap: 9px; padding: 8px 12px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02); cursor: pointer; text-align: left; font: inherit; color: rgba(255,255,255,0.6); font-size: .83rem; line-height: 1.5; transition: background .15s, border-color .15s, color .15s; width: 100%; }
    .quiz-opt:hover:not([disabled]) { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.14); color: rgba(255,255,255,0.82); }
    .quiz-opt.correct { background: rgba(76,184,122,0.1); border-color: rgba(76,184,122,0.3); color: rgba(76,184,122,0.95); cursor: default; }
    .quiz-opt.wrong { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.22); color: rgba(255,120,100,0.8); cursor: default; }
    .quiz-opt.dimmed { opacity: 0.4; cursor: default; }
    .quiz-opt[disabled] { cursor: default; }
    .quiz-opt-letter { flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 800; color: rgba(255,255,255,0.35); margin-top: 1px; }

    function eKey(email) { return email.replace(/[.@#$[\]/]/g,'_'); }

    function fbGet(p) {
      if (!FB_READY) return Promise.resolve(null);
      return fetch(DB_URL + '/' + p + '.json').then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
    }
    function fbPatch(p, d) {
      if (!FB_READY) return Promise.resolve(false);
      return fetch(DB_URL + '/' + p + '.json', { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d) }).then(function(r) { return r.ok; }).catch(function() { return false; });
    }
    function fbSet(p, d) {
      if (!FB_READY) return Promise.resolve(false);
      return fetch(DB_URL + '/' + p + '.json', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d) }).then(function(r) { return r.ok; }).catch(function() { return false; });
    }
    function fbPost(p, d) {
      if (!FB_READY) return Promise.resolve(null);
      return fetch(DB_URL + '/' + p + '.json', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(d) }).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
    }

    function syncProgressToFirebase(session, progress) {
      if (!session || !FB_READY) return;
      var key = eKey(session.email);
      var data = { meta: { name: session.name || '', email: session.email, updatedAt: Date.now() } };
      ALL_TRACK_IDS.forEach(function(id) { if (progress[id]) data[id] = progress[id]; });
      fbPatch('track-progress/' + key, data);
    }

    /* ══════════════════════════════════════════
       STORAGE HELPERS
    ══════════════════════════════════════════ */
    function getProgress() {
      try { return JSON.parse(localStorage.getItem('aec-track-progress') || '{}'); } catch(e) { return {}; }
    }

    function saveProgress(p) {
      try { localStorage.setItem('aec-track-progress', JSON.stringify(p)); } catch(e) {}
      syncProgressToFirebase(getSession(), p);
    }

    function getSession() {
      try {
        var raw = JSON.parse(localStorage.getItem('aec-session') || 'null');
        if (raw && raw.loginAt && Date.now() - raw.loginAt > 30*24*60*60*1000) {
          localStorage.removeItem('aec-session'); return null;
        }
        return raw;
      } catch(e) { return null; }
    }

    function countDone(trackId) {
      var p = getProgress();
      var arr = p[trackId];
      if (!Array.isArray(arr)) return 0;
      return arr.filter(Boolean).length;
    }

    var toastTimer = null;
    function showToast(msg, icon) {
      var t = document.getElementById('toast');
      var m = document.getElementById('toast-msg');
      var i = document.getElementById('toast-icon');
      if (!t) return;
      if (toastTimer) clearTimeout(toastTimer);
      if (m) m.textContent = msg;
      if (i) i.textContent = icon || '✓';
      t.classList.add('show');
      toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3200);
    }

    function renderTrack(id, track, submissions) {
      submissions = submissions || {};
      var progress = getProgress();
      var session = getSession();
      var completed = Array.isArray(progress[id]) ? progress[id] : Array(5).fill(false);
      var done = completed.filter(Boolean).length;
      var pct = (done / 5) * 100;

      // Determine status label
      var statusClass = done === 0 ? 'not-started' : (done < 5 ? 'in-progress' : 'complete');
      var statusText = done === 0 ? 'Not Started' : (done < 5 ? 'In Progress' : 'Complete');

      // Build skill tags
      var tagsHtml = track.tags.map(function(t) { return '<span class="skill-tag">' + esc(t) + '</span>'; }).join('');

      // Build module list
      var DIFF_SECTIONS = [
        { idx: 0, cls: 'diff-foundation',   label: 'Learn the Concepts',    badge: 'Foundation',   badgeCls: 'diff-badge-foundation' },
        { idx: 2, cls: 'diff-intermediate', label: 'Apply to Real Work',    badge: 'Intermediate', badgeCls: 'diff-badge-intermediate' },
        { idx: 4, cls: 'diff-capstone',     label: 'Build Your Portfolio Piece', badge: 'Capstone', badgeCls: 'diff-badge-capstone' }
      ];
      function getDiff(i) {
        if (i >= 4) return DIFF_SECTIONS[2];
        if (i >= 2) return DIFF_SECTIONS[1];
        return DIFF_SECTIONS[0];
      }
      var modulesHtml = track.modules.map(function(mod, idx) {
        var isDone = completed[idx] === true;
        var sub = submissions[idx] || null;
        var numLabel = isDone ? '✓' : (idx + 1 < 10 ? '0' + (idx+1) : String(idx+1));
        var diff = getDiff(idx);
        // Insert section divider before the first module of each difficulty group
        var sectionHeader = '';
        if (idx === 0 || idx === 2 || idx === 4) {
          var sec = DIFF_SECTIONS.find(function(s) { return s.idx === idx; });
          sectionHeader = '<div class="difficulty-section ' + sec.cls + '">' +
            '<div class="difficulty-section-line"></div>' +
            '<span class="difficulty-section-label">' + sec.label + '</span>' +
            '<div class="difficulty-section-line"></div>' +
          '</div>';
        }

        // Compact header badge
        var headerBadge;
        if (isDone) {
          headerBadge = '<span class="complete-btn done-badge">Completed ✓</span>';
        } else if (sub && sub.status === 'pending') {
          headerBadge = '<span class="pending-badge">⏳ Under Review</span>';
        } else if (sub && sub.status === 'rejected') {
          headerBadge = '<span class="rejected-badge">✗ Revision Needed</span>';
        } else if (!session) {
          headerBadge = '<span class="signin-prompt"><a href="signin.html">Sign in</a> to submit</span>';
        } else {
          headerBadge = '';
        }

        // Submit section (below card body)
        var submitSection = '';
        if (!isDone && !(sub && sub.status === 'pending') && session) {
          var prevLink = (sub && sub.link) ? sub.link : '';
          var rejectedHtml = (sub && sub.status === 'rejected' && sub.reviewNote)
            ? '<p class="rejected-note">Officer note: ' + esc(sub.reviewNote) + '</p>' : '';
          submitSection = '<div class="module-submit-section">' +
            (sub && sub.status === 'rejected' ? '<div class="rejected-wrap">' + rejectedHtml : '') +
            '<div class="module-submit-wrap" id="submit-wrap-' + idx + '">' +
              '<input type="url" class="submit-link-input" id="submit-link-' + idx + '"' +
                ' placeholder="Paste your Google Doc, Sheet, or Slides link…"' +
                ' value="' + esc(prevLink) + '" />' +
              '<div class="submit-row">' +
                '<button class="submit-btn" onclick="submitDeliverable(\'' + id + '\',' + idx + ')">Submit for Review</button>' +
                '<span class="submit-hint">Officers review within 48 hrs</span>' +
              '</div>' +
            '</div>' +
            (sub && sub.status === 'rejected' ? '</div>' : '') +
          '</div>';
        }

        // Tool tags — linked where a known URL exists
        var toolsHtml = mod.tools.map(function(t) {
          var url = TOOL_URLS[t];
          if (url) return '<a href="' + url + '" target="_blank" rel="noopener" class="tool-tag" style="color:rgba(196,164,72,0.75);border-color:rgba(196,164,72,0.18);text-decoration:none;">' + esc(t) + ' ↗</a>';
          return '<span class="tool-tag">' + esc(t) + '</span>';
        }).join('');

        // Concepts strip
        var conceptsHtml = '';
        if (mod.concepts && mod.concepts.length) {
          var pills = mod.concepts.map(function(c, ci) {
            var key = 'c' + idx + '_' + ci;
            return '<button class="concept-pill" data-key="' + key + '" onclick="toggleConcept(this)">' + esc(c.term) + '</button>';
          }).join('');
          var defs = mod.concepts.map(function(c, ci) {
            var key = 'c' + idx + '_' + ci;
            return '<div class="concept-def-row" id="cdef-' + key + '"><span class="cdef-term">' + esc(c.term) + ':</span>' + esc(c.def) + '</div>';
          }).join('');
          conceptsHtml = '<div class="concepts-section"><div class="concepts-strip">' + pills + '</div><div class="concept-defs">' + defs + '</div></div>';
        }

        // Video links
        var videosHtml = '';
        if (mod.videos && mod.videos.length) {
          var vids = mod.videos.map(function(v) {
            return '<a href="' + v.url + '" target="_blank" rel="noopener" class="vid-link">' + esc(v.label) + '</a>';
          }).join('');
          videosHtml = '<div class="resource-bar"><span class="resource-label">Watch first</span>' + vids + '</div>';
        }

        // Step-by-step panel
        var stepsHtml = '';
        if (mod.steps && mod.steps.length) {
          var stepItems = mod.steps.map(function(s, si) {
            return '<li><span class="step-num">' + (si + 1) + '</span><span>' + esc(s) + '</span></li>';
          }).join('');
          stepsHtml = '<details class="expand-panel"><summary>Step-by-step guide <span style="color:rgba(255,255,255,0.22);font-weight:400;font-size:.73rem;margin-left:6px;">' + mod.steps.length + ' steps</span><span class="panel-chevron">▾</span></summary><div class="expand-body"><ol class="steps-list">' + stepItems + '</ol></div></details>';
        }

        // Scenario + solution panel
        var scenarioHtml = '';
        if (mod.scenario) {
          var solHtml = mod.solution
            ? '<button class="reveal-btn" onclick="revealSolution(this)">Reveal answer ▾</button><div class="solution-block"><div class="solution-label">Key answer</div>' + esc(mod.solution) + '</div>'
            : '';
          scenarioHtml = '<details class="expand-panel"><summary>Practice scenario<span class="panel-chevron">▾</span></summary><div class="expand-body"><div class="scenario-label">Try this</div><div class="scenario-block">' + esc(mod.scenario) + '</div>' + solHtml + '</div></details>';
        }

        var isCapstone = idx === 4;
        var isFoundation = idx <= 1;

        // Resume-line banner for capstone
        var resumeLineHtml = '';
        if (isCapstone && mod.resumeLine) {
          resumeLineHtml = '<div class="resume-line"><span class="resume-line-icon">📄</span><div class="resume-line-text"><strong>Resume line</strong>' + esc(mod.resumeLine) + '</div></div>';
        }

        // Quiz block for foundation modules
        var quizHtml = '';
        if (isFoundation && mod.quiz && mod.quiz.length) {
          var letters = ['A','B','C','D'];
          var qs = mod.quiz.map(function(q, qi) {
            var opts = q.opts.map(function(opt, oi) {
              return '<button class="quiz-opt" onclick="answerQuiz(this,' + qi + ',' + oi + ',' + q.ans + ',' + idx + ')">' +
                '<span class="quiz-opt-letter">' + letters[oi] + '</span>' + esc(opt) +
              '</button>';
            }).join('');
            return '<div class="quiz-q">' +
              '<div class="quiz-q-text">' + esc(q.q) + '</div>' +
              '<div class="quiz-opts">' + opts + '</div>' +
              '<div class="quiz-explain">' + esc(q.explain) + '</div>' +
            '</div>';
          }).join('');
          quizHtml = '<div class="quiz-section"><span class="quiz-label">Concept check</span><div class="quiz-questions">' + qs + '</div></div>';
        }

        return sectionHeader +
          '<article class="module-card' + (isDone ? ' done' : '') + (isCapstone ? ' capstone' : '') + '" style="animation-delay:' + (idx * 0.07) + 's">' +
          '<div class="module-header">' +
            '<div class="module-meta"><div class="module-num">' + numLabel + '</div><span class="module-time">' + esc(mod.time) + '</span><span class="diff-badge ' + diff.badgeCls + '">' + diff.badge + '</span></div>' +
            '<div class="module-action">' + headerBadge + '</div>' +
          '</div>' +
          '<div class="module-title">' + esc(mod.title) + '</div>' +
          '<div class="module-divider"></div>' +
          resumeLineHtml +
          conceptsHtml +
          '<p class="module-desc">' + esc(mod.desc) + '</p>' +
          videosHtml +
          stepsHtml +
          scenarioHtml +
          quizHtml +
          '<div class="module-footer" style="margin-top:16px;">' +
            '<div class="module-tools"><span class="tools-label">Tools</span>' + toolsHtml + '</div>' +
            '<div class="module-deliverable"><strong>Deliverable:</strong> ' + esc(mod.deliverable) + '</div>' +
          '</div>' +
          submitSection +
        '</article>';
      }).join('');

      // Build related cards
      var relatedHtml = (track.related || []).map(function(rid) {
        var r = TRACKS[rid];
        if (!r) return '';
        return '<a class="related-card" href="track.html?id=' + rid + '">' +
          '<span class="track-badge">' + esc(r.badge) + '</span>' +
          '<div class="related-name">' + esc(r.name) + '</div>' +
          '<div class="related-tagline">' + esc(r.tagline) + '</div>' +
          '</a>';
      }).join('');

      document.title = track.name + ' Track | UCSB Applied Economics Club';

      var html =
        '<a class="back-link" href="topics.html">All Tracks</a>' +

        '<section class="track-hero">' +
          '<div class="hero-top">' +
            '<div class="hero-left">' +
              '<span class="track-badge">' + esc(track.badge) + '</span>' +
              '<h1 class="track-title">' + esc(track.name) + '</h1>' +
              '<p class="track-tagline-lg">' + esc(track.tagline) + '</p>' +
              '<div class="skill-tags">' + tagsHtml + '</div>' +
            '</div>' +
            '<div class="hero-progress">' +
              '<div class="hp-nums"><span class="hp-done" id="hp-done">' + done + '</span><span class="hp-total">&thinsp;/5 modules</span></div>' +
              '<div class="hp-bar-wrap"><div class="hp-bar-fill" id="hp-fill" style="width:' + pct + '%"></div></div>' +
              '<div class="hp-credits" id="hp-credits"><strong>' + done + '</strong> credit' + (done !== 1 ? 's' : '') + ' earned</div>' +
              '<div class="hp-status ' + statusClass + '" id="hp-status">' + statusText + '</div>' +
            '</div>' +
          '</div>' +
        '</section>' +

        '<div class="gold-divider"></div>' +
        '<span class="section-label">Track modules</span>' +

        '<div class="modules-list" id="modules-list">' + modulesHtml + '</div>' +

        '<div class="track-complete' + (done === 5 ? ' visible' : '') + '" id="track-complete">' +
          '<span class="tc-icon">★</span>' +
          '<div class="tc-title">Track Complete</div>' +
          '<p class="tc-copy">You\'ve completed all 5 ' + esc(track.name) + ' modules and earned 5 credits. These credits add to your vote weight and move you up the speaker queue.</p>' +
          '<a href="topics.html" class="btn-secondary">Explore Other Tracks →</a>' +
        '</div>' +

        '<div class="verify-note"><strong>How it works:</strong> Paste your deliverable link (Google Doc, Sheet, or Slides) into each module and submit for review. Officers approve within 48 hours — the module is marked complete once approved.</div>' +

          '<span class="section-label">Related tracks</span>' +
          '<div class="related-grid">' + relatedHtml + '</div>' +
        '</section>' +

        '<footer class="footer"><strong>UCSB Applied Economics Club</strong> &nbsp;&middot;&nbsp; Student-led economics education</footer>';

      var main = document.getElementById('page-main');
      if (main) main.innerHTML = html;

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function answerQuiz(btn, qIdx, optIdx, ansIdx, modIdx) {
      var correct = optIdx === ansIdx;
      var opts = btn.parentElement.querySelectorAll('.quiz-opt');
      opts.forEach(function(o, i) {
        o.disabled = true;
        if (i === ansIdx) o.classList.add('correct');
        else if (i === optIdx && !correct) o.classList.add('wrong');
        else o.classList.add('dimmed');
      });
      var explain = btn.parentElement.parentElement.querySelector('.quiz-explain');
      if (explain) explain.classList.add('show');
    }

    function toggleConcept(btn) {
      var key = btn.dataset.key;
      var def = document.getElementById('cdef-' + key);
      if (!def) return;
      var isOpen = def.classList.contains('open');
      // Close all open definitions and deactivate all pills in this card
      var card = btn.closest('.module-card');
      if (card) {
        card.querySelectorAll('.concept-def-row.open').forEach(function(el) { el.classList.remove('open'); });
        card.querySelectorAll('.concept-pill.active').forEach(function(el) { el.classList.remove('active'); });
      }
      if (!isOpen) {
        def.classList.add('open');
        btn.classList.add('active');
      }
    }

    function revealSolution(btn) {
      var sol = btn.nextElementSibling;
      if (!sol) return;
      var opening = !sol.classList.contains('open');
      sol.classList.toggle('open');
      btn.textContent = opening ? 'Hide answer ▴' : 'Reveal answer ▾';
    }

    function markComplete(trackId, idx) {
      var session = getSession();
      if (!session) {
        showToast('Sign in to track your progress', '→');
        setTimeout(function() { window.location.href = 'signin.html'; }, 1200);
        return;
      }

      var progress = getProgress();
      if (!Array.isArray(progress[trackId])) progress[trackId] = Array(5).fill(false);
      if (progress[trackId][idx] === true) return; // already done

      progress[trackId][idx] = true;
      saveProgress(progress);

      var done = progress[trackId].filter(Boolean).length;
      var pct = (done / 5) * 100;

      // Update hero progress card
      var hpDone = document.getElementById('hp-done');
      if (hpDone) hpDone.textContent = done;
      var hpFill = document.getElementById('hp-fill');
      if (hpFill) hpFill.style.width = pct + '%';
      var hpCreds = document.getElementById('hp-credits');
      if (hpCreds) hpCreds.innerHTML = '<strong>' + done + '</strong> credit' + (done !== 1 ? 's' : '') + ' earned';
      var hpStatus = document.getElementById('hp-status');
      if (hpStatus) {
        hpStatus.className = 'hp-status ' + (done < 5 ? 'in-progress' : 'complete');
        hpStatus.textContent = done < 5 ? 'In Progress' : 'Complete';
      }

      // Update the specific module card
      var btn = document.querySelector('[data-idx="' + idx + '"]');
      if (btn) {
        btn.outerHTML = '<span class="complete-btn done-badge">Completed ✓</span>';
      }
      var card = document.querySelectorAll('.module-card')[idx];
      if (card) {
        card.classList.add('done');
        var numEl = card.querySelector('.module-num');
        if (numEl) numEl.textContent = '✓';
      }

      // Toast
      showToast('Module ' + (idx + 1) + ' complete — +1 credit earned', '✓');

      // Track complete banner
      if (done === 5) {
        var banner = document.getElementById('track-complete');
        if (banner) {
          banner.classList.add('visible');
          setTimeout(function() { banner.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }
        showToast('Track complete! 5 credits earned', '★');
      }
    }

    /* ══════════════════════════════════════════
       SUBMIT DELIVERABLE
    ══════════════════════════════════════════ */
    function submitDeliverable(trackId, idx) {
      var session = getSession();
      if (!session) {
        showToast('Sign in to submit', '→');
        setTimeout(function() { window.location.href = 'signin.html'; }, 1200);
        return;
      }
      var linkEl = document.getElementById('submit-link-' + idx);
      if (!linkEl) return;
      var link = linkEl.value.trim();
      if (!link) {
        linkEl.style.borderColor = 'rgba(255,100,80,0.55)';
        setTimeout(function() { linkEl.style.borderColor = ''; }, 2200);
        showToast('Paste your deliverable link first', '!');
        return;
      }
      if (!/^https?:\/\//i.test(link)) {
        linkEl.style.borderColor = 'rgba(255,100,80,0.55)';
        showToast('Link must start with https://', '!');
        return;
      }

      var btn = document.querySelector('#submit-wrap-' + idx + ' .submit-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

      var track = TRACKS[trackId];
      var modName = track ? track.modules[idx].title : 'Module ' + (idx + 1);
      var trackName = track ? track.name : trackId;

      var submission = {
        trackId: trackId, idx: idx,
        moduleName: modName, trackName: trackName,
        email: session.email, name: session.name || '',
        link: link, submittedAt: Date.now(), status: 'pending'
      };

      if (FB_READY) {
        fbSet('submissions/' + eKey(session.email) + '/' + trackId + '/' + idx, submission)
          .then(function(ok) {
            if (ok) {
              // Swap submit form to pending badge
              var wrap = document.getElementById('submit-wrap-' + idx);
              if (wrap) {
                var section = wrap.closest('.module-submit-section');
                if (section) section.innerHTML = '<span class="pending-badge">⏳ Under Review</span>';
              }
              // Update header badge
              var cards = document.querySelectorAll('.module-card');
              if (cards[idx]) {
                var actionDiv = cards[idx].querySelector('.module-action');
                if (actionDiv) actionDiv.innerHTML = '<span class="pending-badge">⏳ Under Review</span>';
              }
              showToast('Submitted — officers will review within 48 hrs', '📎');
              // Log activity
              fbPost('activity', { email: session.email, name: session.name || '', type: 'submission',
                detail: trackName + ' · ' + modName, at: Date.now() });
            } else {
              if (btn) { btn.disabled = false; btn.textContent = 'Submit for Review'; }
              showToast('Submission failed — try again', '✗');
            }
          });
      } else {
        // Firebase not configured — fall back to direct mark complete
        markComplete(trackId, idx);
      }
    }

    /* ══════════════════════════════════════════
       NAV
    ══════════════════════════════════════════ */
    window.addEventListener('scroll', function() {
      document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 8);
    }, { passive: true });

    function updateAdminLinkVisibility() {
      try {
        var session = getSession();
        var isAdmin = session && (session.email === 'quinnbaltazar@ucsb.edu' || session.isAdmin === true);
        var l = document.getElementById('admin-nav-link');
        if (l) l.style.display = isAdmin ? 'inline-flex' : 'none';
        var ml = document.getElementById('members-nav-link');
        if (ml) ml.style.display = session ? 'inline-flex' : 'none';
        var sl = document.querySelector('.main-nav a[href="signin.html"]');
        if (sl) sl.textContent = session ? 'Profile' : 'Sign In';
      } catch(e) {}
    }

    /* ══════════════════════════════════════════
       INIT
    ══════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', async function() {
      updateAdminLinkVisibility();

      // Parse track ID from URL
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id') || '';
      var track = TRACKS[id];

      if (!track) {
        window.location.href = 'topics.html';
        return;
      }

      var session = getSession();

      // Load submissions + progress from Firebase before first render
      var submissions = {};
      if (session && FB_READY) {
        var results = await Promise.all([
          fbGet('submissions/' + eKey(session.email) + '/' + id),
          fbGet('track-progress/' + eKey(session.email))
        ]);
        var subData = results[0];
        var fbProgressData = results[1];

        if (subData) {
          // Keyed by module index (Firebase stores keys as strings)
          Object.keys(subData).forEach(function(k) { submissions[parseInt(k, 10)] = subData[k]; });
        }

        // Merge Firebase progress into localStorage
        if (fbProgressData) {
          var progress = getProgress();
          var changed = false;
          ALL_TRACK_IDS.forEach(function(tid) {
            if (Array.isArray(fbProgressData[tid])) {
              if (!Array.isArray(progress[tid])) progress[tid] = Array(5).fill(false);
              fbProgressData[tid].forEach(function(v, i) {
                if (v === true && !progress[tid][i]) { progress[tid][i] = true; changed = true; }
              });
            }
          });
          if (changed) try { localStorage.setItem('aec-track-progress', JSON.stringify(progress)); } catch(e) {}
        }
      }

      renderTrack(id, track, submissions);

      // Mobile nav toggle
      (function() {
        var btn = document.getElementById('nav-toggle');
        var nav = document.getElementById('main-nav');
        if (!btn || !nav) return;
        btn.addEventListener('click', function() {
          var open = nav.classList.toggle('open');
          btn.classList.toggle('open', open);
          btn.setAttribute('aria-expanded', String(open));
        });
        nav.querySelectorAll('a').forEach(function(a) {
          a.addEventListener('click', function() {
            nav.classList.remove('open');
            btn.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
          });
        });
      })();
    });
  </script>
</body>
